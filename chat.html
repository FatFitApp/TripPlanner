<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Chat - Trip Planner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="chat-container">
        <header class="app-header">
            <button class="menu-btn" onclick="window.location.href='home.html'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h2 id="chatTitle">Chat da Viagem</h2>
            <div style="width: 40px;"></div>
        </header>

        <main class="chat-messages" id="chatMessages">
            <div class="empty-state">
                <i class="fas fa-comments"></i>
                <p>Nenhuma mensagem ainda</p>
                <p style="font-size: 12px;">Seja o primeiro a enviar uma mensagem!</p>
            </div>
        </main>

        <div class="chat-input-container">
            <div class="chat-input-wrapper">
                <button class="chat-attach-btn" id="attachBtn">
                    <i class="fas fa-image"></i>
                </button>
                <input type="text" id="chatInput" placeholder="Digite uma mensagem..." class="chat-input">
                <button class="chat-send-btn" id="sendBtn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <input type="file" id="chatImage" accept="image/*" style="display: none;">
        </div>
    </div>

    <div id="loading-screen" class="loading-screen" style="display: none;">
        <div class="loading-content">
            <i class="fas fa-plane-departure fa-3x loading-icon"></i>
            <div class="loading-dots"><span></span><span></span><span></span></div>
            <p>Carregando...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        let currentTripId = null;
        let currentTrip = null;
        let currentUser = null;
        let currentProfile = null;
        let chatSubscription = null;
        let selectedImageFile = null;

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i><span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('show');
                setTimeout(() => toast.remove(), 3000);
            }, 10);
        }

        function showLoading() {
            document.getElementById('loading-screen').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loading-screen').style.display = 'none';
        }

        async function loadChat() {
            const params = new URLSearchParams(window.location.search);
            currentTripId = params.get('id');
            
            if (!currentTripId) {
                showToast('Nenhuma viagem selecionada', 'error');
                setTimeout(() => window.location.href = 'home.html', 1500);
                return;
            }

            showLoading();
            
            const session = await checkAuth();
            if (!session) return;
            currentUser = session.user;
            currentProfile = await getUserProfile(currentUser.id);
            
            const { data: trip } = await db.from('trips').select('*').eq('id', currentTripId).single();
            currentTrip = trip;
            document.getElementById('chatTitle').innerHTML = `<i class="fas fa-comment-dots"></i> ${escapeHtml(trip.title)}`;
            
            await loadMessages();
            setupRealtime();
            setupEventListeners();
            
            hideLoading();
        }

        async function loadMessages() {
            const { data: messages, error } = await db
                .from('trip_messages')
                .select(`
                    *,
                    profiles:user_id (name, avatar_url)
                `)
                .eq('trip_id', currentTripId)
                .order('created_at', { ascending: true });
            
            if (error) {
                console.error('Erro ao carregar mensagens:', error);
                return;
            }
            
            const container = document.getElementById('chatMessages');
            
            if (!messages || messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-comments"></i>
                        <p>Nenhuma mensagem ainda</p>
                        <p style="font-size: 12px;">Seja o primeiro a enviar uma mensagem!</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = messages.map(msg => `
                <div class="chat-message ${msg.user_id === currentUser.id ? 'own-message' : 'other-message'}">
                    ${msg.user_id !== currentUser.id ? `<img src="${msg.profiles?.avatar_url || 'https://via.placeholder.com/32'}" class="chat-avatar">` : ''}
                    <div class="chat-bubble">
                        ${msg.user_id !== currentUser.id ? `<div class="chat-name">${escapeHtml(msg.profiles?.name || 'Usuário')}</div>` : ''}
                        ${msg.image_url ? `<img src="${msg.image_url}" class="chat-image" onclick="viewImage('${msg.image_url}')">` : ''}
                        ${msg.message ? `<div class="chat-text">${escapeHtml(msg.message)}</div>` : ''}
                        <div class="chat-time">${formatRelativeTime(msg.created_at)}</div>
                    </div>
                </div>
            `).join('');
            
            // Scroll para o final
            container.scrollTop = container.scrollHeight;
        }

        function setupRealtime() {
            if (chatSubscription) {
                db.removeChannel(chatSubscription);
            }
            
            chatSubscription = db
                .channel(`chat-${currentTripId}`)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'trip_messages',
                    filter: `trip_id=eq.${currentTripId}`
                }, payload => {
                    addNewMessage(payload.new);
                })
                .subscribe();
        }

        async function addNewMessage(message) {
            const { data: profile } = await db
                .from('profiles')
                .select('name, avatar_url')
                .eq('id', message.user_id)
                .single();
            
            const container = document.getElementById('chatMessages');
            
            // Remove empty state se existir
            if (container.querySelector('.empty-state')) {
                container.innerHTML = '';
            }
            
            const messageHtml = `
                <div class="chat-message ${message.user_id === currentUser.id ? 'own-message' : 'other-message'}">
                    ${message.user_id !== currentUser.id ? `<img src="${profile?.avatar_url || 'https://via.placeholder.com/32'}" class="chat-avatar">` : ''}
                    <div class="chat-bubble">
                        ${message.user_id !== currentUser.id ? `<div class="chat-name">${escapeHtml(profile?.name || 'Usuário')}</div>` : ''}
                        ${message.image_url ? `<img src="${message.image_url}" class="chat-image" onclick="viewImage('${message.image_url}')">` : ''}
                        ${message.message ? `<div class="chat-text">${escapeHtml(message.message)}</div>` : ''}
                        <div class="chat-time">Agora mesmo</div>
                    </div>
                </div>
            `;
            
            container.insertAdjacentHTML('beforeend', messageHtml);
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const message = document.getElementById('chatInput').value.trim();
            
            if (!message && !selectedImageFile) {
                return;
            }
            
            showLoading();
            
            let imageUrl = null;
            if (selectedImageFile) {
                try {
                    imageUrl = await uploadImage(selectedImageFile, 'chat-images', `${currentTripId}`);
                } catch (error) {
                    hideLoading();
                    showToast('Erro ao enviar imagem', 'error');
                    return;
                }
            }
            
            const { error } = await db.from('trip_messages').insert({
                trip_id: currentTripId,
                user_id: currentUser.id,
                message: message || null,
                image_url: imageUrl,
                created_at: new Date()
            });
            
            hideLoading();
            
            if (error) {
                showToast('Erro ao enviar mensagem', 'error');
                return;
            }
            
            document.getElementById('chatInput').value = '';
            selectedImageFile = null;
        }

        function viewImage(url) {
            const modal = document.createElement('div');
            modal.className = 'modal open';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div style="background: black; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%;">
                    <img src="${url}" style="max-width: 90%; max-height: 90%; object-fit: contain;">
                    <button style="position: absolute; top: 20px; right: 20px; background: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer;" onclick="this.parentElement.remove()">✕</button>
                </div>
            `;
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });
            document.body.appendChild(modal);
        }

        function setupEventListeners() {
            document.getElementById('sendBtn').addEventListener('click', sendMessage);
            document.getElementById('chatInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
            
            document.getElementById('attachBtn').addEventListener('click', () => {
                document.getElementById('chatImage').click();
            });
            
            document.getElementById('chatImage').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    selectedImageFile = file;
                    showToast('Imagem selecionada! Envie a mensagem.', 'success');
                }
            });
        }

        loadChat();
    </script>
    <style>
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--gray-100);
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            margin-top: var(--header-height);
            margin-bottom: 0;
        }
        
        .chat-message {
            display: flex;
            margin-bottom: 16px;
            align-items: flex-start;
        }
        
        .chat-message.own-message {
            justify-content: flex-end;
        }
        
        .chat-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .chat-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 20px;
            background: white;
            box-shadow: var(--shadow-xs);
        }
        
        .own-message .chat-bubble {
            background: var(--primary);
            color: white;
        }
        
        .chat-name {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--gray-500);
        }
        
        .own-message .chat-name {
            color: rgba(255,255,255,0.8);
        }
        
        .chat-text {
            font-size: 14px;
            word-wrap: break-word;
        }
        
        .chat-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
        }
        
        .chat-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        
        .chat-input-container {
            padding: 12px 16px;
            background: white;
            border-top: 1px solid var(--gray-200);
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }
        
        .chat-input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--gray-100);
            border-radius: 25px;
            padding: 4px 8px;
        }
        
        .chat-input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 0;
            font-size: 15px;
            outline: none;
        }
        
        .chat-attach-btn, .chat-send-btn {
            background: none;
            border: none;
            padding: 8px;
            cursor: pointer;
            color: var(--primary);
            font-size: 20px;
        }
        
        .chat-send-btn {
            color: var(--primary);
        }
    </style>
</body>
</html>
