<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Meu Perfil - Trip Planner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // ============================================
        // FALLBACK buildUrl (caso config.js não carregue)
        // ============================================
        if (typeof buildUrl === 'undefined') {
            window.buildUrl = function(path) {
                if (window.location.hostname.includes('github.io')) {
                    const pathParts = window.location.pathname.split('/');
                    if (pathParts.length > 1 && pathParts[1]) {
                        const base = '/' + pathParts[1] + '/';
                        const cleanPath = path.startsWith('/') ? path.substring(1) : path;
                        return base + cleanPath;
                    }
                }
                return '/' + (path.startsWith('/') ? path.substring(1) : path);
            };
            console.log('⚠️ buildUrl carregado via fallback');
        }
    </script>
    <script src="config.js"></script>
</head>
<body>
    <div class="home-container">
        <header class="app-header">
            <button class="menu-btn" onclick="window.location.href=buildUrl('home.html')">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h2>Meu Perfil</h2>
            <button class="menu-btn" id="editProfileBtn">
                <i class="fas fa-edit"></i>
            </button>
        </header>

        <main class="main-content">
            <!-- Cabeçalho do Perfil -->
            <div class="profile-header card" style="text-align: center;">
                <div class="profile-avatar-container" style="position: relative; display: inline-block;">
                    <img id="profileAvatar" src="https://via.placeholder.com/100" class="avatar-lg" style="width: 100px; height: 100px;">
                    <button id="changeAvatarBtn" class="change-avatar-btn">
                        <i class="fas fa-camera"></i>
                    </button>
                </div>
                <h3 id="profileName">Carregando...</h3>
                <p id="profileEmail" style="color: var(--gray-500);"></p>
                <p id="profileBio" style="margin-top: 8px;"></p>
            </div>

            <!-- Estatísticas -->
            <div class="stats-grid" style="display: flex; gap: 12px; margin: 16px 0;">
                <div class="card" style="flex: 1; text-align: center;">
                    <i class="fas fa-plane" style="font-size: 24px; color: var(--primary);"></i>
                    <h3 id="tripCount">0</h3>
                    <small>Viagens</small>
                </div>
                <div class="card" style="flex: 1; text-align: center;">
                    <i class="fas fa-camera" style="font-size: 24px; color: var(--secondary);"></i>
                    <h3 id="postCount">0</h3>
                    <small>Posts</small>
                </div>
                <div class="card" style="flex: 1; text-align: center;">
                    <i class="fas fa-users" style="font-size: 24px; color: var(--success);"></i>
                    <h3 id="friendCount">0</h3>
                    <small>Amigos</small>
                </div>
            </div>

            <!-- Minhas Postagens com opção de excluir -->
            <div class="card">
                <div class="flex justify-between align-center">
                    <h4>📸 Minhas Postagens</h4>
                    <button class="btn-secondary" onclick="window.location.href=buildUrl('home.html?action=register')">
                        <i class="fas fa-plus"></i> Nova
                    </button>
                </div>
                <div id="userPosts" class="posts-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 16px;">
                    <div class="empty-state" style="grid-column: span 3;">
                        <p>Nenhuma postagem ainda</p>
                    </div>
                </div>
            </div>

            <!-- Minhas Viagens -->
            <div class="card">
                <h4>✈️ Minhas Viagens</h4>
                <div id="userTrips"></div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item" onclick="window.location.href=buildUrl('home.html')">
                <i class="fas fa-home"></i>
                <span>Timeline</span>
            </button>
            <button class="nav-item" onclick="goToTripDetail()">
                <i class="fas fa-clipboard-list"></i>
                <span>Detalhes</span>
            </button>
            <button class="nav-item nav-item-center" onclick="window.location.href=buildUrl('home.html?action=register')">
                <i class="fas fa-camera"></i>
                <span>Registrar</span>
            </button>
            <button class="nav-item" onclick="window.location.href=buildUrl('costs.html')">
                <i class="fas fa-chart-line"></i>
                <span>Custos</span>
            </button>
            <button class="nav-item" onclick="goToChat()">
                <i class="fas fa-comment-dots"></i>
                <span>Chat</span>
            </button>
        </nav>
    </div>

    <!-- Modal Editar Perfil -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Editar Perfil</h3>
                <button class="modal-close" onclick="closeModal('editModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="editName" placeholder="Nome">
                </div>
                <div class="input-group">
                    <i class="fas fa-info-circle"></i>
                    <textarea id="editBio" placeholder="Sobre você..." rows="3" style="resize: none;"></textarea>
                </div>
                <button class="btn-primary btn-full" onclick="saveProfile()">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Modal Confirmar Exclusão de Post -->
    <div id="deletePostModal" class="modal">
        <div class="modal-content">
            <div class="modal-header" style="border-bottom-color: var(--danger);">
                <h3 style="color: var(--danger);">⚠️ Excluir Postagem</h3>
                <button class="modal-close" onclick="closeModal('deletePostModal')">&times;</button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 16px;">Tem certeza que deseja excluir esta postagem?</p>
                <p style="color: var(--gray-500); font-size: 14px; margin-bottom: 16px;">Esta ação não pode ser desfeita.</p>
                <input type="hidden" id="deletePostId">
                <div class="flex gap-1">
                    <button class="btn-secondary" style="flex: 1;" onclick="closeModal('deletePostModal')">Cancelar</button>
                    <button class="btn-danger" style="flex: 1;" onclick="confirmDeletePost()">
                        <i class="fas fa-trash"></i> Sim, excluir
                    </button>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="avatarInput" accept="image/*" style="display: none;">

    <!-- Loading -->
    <div id="loading-screen" class="loading-screen" style="display: none;">
        <div class="loading-content">
            <i class="fas fa-plane-departure fa-3x loading-icon"></i>
            <div class="loading-dots"><span></span><span></span><span></span></div>
            <p>Carregando...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        // ============================================
        // VARIÁVEIS GLOBAIS
        // ============================================
        let currentUser = null;
        let currentProfile = null;
        let currentTripId = null;
        let deletePostId = null;

        // ============================================
        // UTILITÁRIOS
        // ============================================
        function showToast(message, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i><span>${message}</span>`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }, 10);
        }

        function showLoading() {
            const loading = document.getElementById('loading-screen');
            if (loading) loading.style.display = 'flex';
        }

        function hideLoading() {
            const loading = document.getElementById('loading-screen');
            if (loading) loading.style.display = 'none';
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) modal.classList.remove('open');
        }

        function openModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) modal.classList.add('open');
        }

        function goToTripDetail() {
            if (currentTripId) {
                window.location.href = buildUrl('trip-detail.html?id=' + currentTripId);
            } else {
                showToast('Selecione uma viagem no menu', 'warning');
            }
        }

        function goToChat() {
            if (currentTripId) {
                window.location.href = buildUrl('chat.html?id=' + currentTripId);
            } else {
                showToast('Selecione uma viagem no menu', 'warning');
            }
        }

        // ============================================
        // CARREGAR PERFIL
        // ============================================
        async function loadProfile() {
            showLoading();
            
            const session = await checkAuth();
            if (!session) {
                hideLoading();
                return;
            }
            currentUser = session.user;
            
            currentProfile = await getUserProfile(currentUser.id);
            
            const nameEl = document.getElementById('profileName');
            const emailEl = document.getElementById('profileEmail');
            const bioEl = document.getElementById('profileBio');
            const avatarEl = document.getElementById('profileAvatar');
            
            if (nameEl) nameEl.textContent = currentProfile?.name || currentUser.user_metadata?.name || 'Viajante';
            if (emailEl) emailEl.textContent = currentUser.email;
            if (bioEl) bioEl.textContent = currentProfile?.bio || 'Aventureiro apaixonado por viagens! 🌍';
            
            if (currentProfile?.avatar_url && avatarEl) {
                avatarEl.src = currentProfile.avatar_url;
            }
            
            const { count: tripCount } = await db.from('trips').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id);
            const { count: postCount } = await db.from('social_posts').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id);
            
            const tripCountEl = document.getElementById('tripCount');
            const postCountEl = document.getElementById('postCount');
            const friendCountEl = document.getElementById('friendCount');
            
            if (tripCountEl) tripCountEl.textContent = tripCount || 0;
            if (postCountEl) postCountEl.textContent = postCount || 0;
            if (friendCountEl) friendCountEl.textContent = '0';
            
            await loadUserPosts();
            await loadUserTrips();
            
            hideLoading();
        }

// ============================================
// CARREGAR POSTS DO USUÁRIO (COM ROTEIRO)
// ============================================
async function loadUserPosts() {
    const { data: posts, error } = await db
        .from('social_posts')
        .select(`
            *,
            itinerary_items:itinerary_item_id (title, day_number)
        `)
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false })
        .limit(12);
    
    const container = document.getElementById('userPosts');
    if (!container) return;
    
    if (error || !posts || posts.length === 0) {
        container.innerHTML = '<div class="empty-state" style="grid-column: span 3;"><p>Nenhuma postagem ainda</p></div>';
        return;
    }
    
    let html = '';
    for (const post of posts) {
        const postId = post.id;
        let imageUrl = post.image_url;
        const actualCost = post.actual_cost;
        const rating = post.rating;
        const itineraryTitle = post.itinerary_items?.title || null;
        const itineraryDay = post.itinerary_items?.day_number || null;
        
        const hasValidImage = imageUrl && imageUrl !== '' && imageUrl !== 'null' && !imageUrl.includes('${');
        
        html += `
            <div class="post-item" style="position: relative; border-radius: var(--radius-sm); overflow: hidden; background: var(--gray-50);">
                ${hasValidImage ? 
                    `<img src="${imageUrl}" style="width: 100%; aspect-ratio: 1; object-fit: cover;" onerror="this.parentElement.innerHTML='<div style=\\'width:100%;aspect-ratio:1;background:var(--gray-200);display:flex;align-items:center;justify-content:center;\\'><i class=\\'fas fa-image\\' style=\\'font-size:24px;color:var(--gray-400);\\'></i></div>'">` : 
                    `<div style="width: 100%; aspect-ratio: 1; background: var(--gray-200); display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-image" style="font-size: 24px; color: var(--gray-400);"></i>
                    </div>`
                }
                ${itineraryTitle ? `<div style="position: absolute; top: 4px; left: 4px; background: rgba(0,0,0,0.7); color: white; border-radius: 12px; padding: 2px 8px; font-size: 10px;">📋 ${escapeHtml(itineraryTitle)}${itineraryDay ? ` (Dia ${itineraryDay})` : ''}</div>` : ''}
                <div class="post-overlay" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); opacity: 0; transition: opacity var(--transition-fast); display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;">
                    <button class="btn-icon" onclick="event.stopPropagation(); openDeletePostModal('${postId}')" style="background: rgba(255,255,255,0.9); padding: 8px 12px; border-radius: var(--radius-sm);">
                        <i class="fas fa-trash" style="color: var(--danger);"></i>
                    </button>
                </div>
                ${actualCost ? `<div style="position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.7); color: white; border-radius: 12px; padding: 2px 8px; font-size: 10px;">💰 ${formatCurrency(actualCost)}</div>` : ''}
                ${rating ? `<div style="position: absolute; bottom: 4px; left: 4px; background: rgba(0,0,0,0.7); color: var(--warning); border-radius: 12px; padding: 2px 8px; font-size: 10px;">⭐ ${rating}</div>` : ''}
            </div>
        `;
    }
    
    container.innerHTML = html;

    document.querySelectorAll('.post-item').forEach(item => {
        item.addEventListener('mouseenter', () => {
            const overlay = item.querySelector('.post-overlay');
            if (overlay) overlay.style.opacity = '1';
        });
        item.addEventListener('mouseleave', () => {
            const overlay = item.querySelector('.post-overlay');
            if (overlay) overlay.style.opacity = '0';
        });
        item.addEventListener('click', () => {
            const overlay = item.querySelector('.post-overlay');
            if (overlay) {
                if (overlay.style.opacity === '1') {
                    overlay.style.opacity = '0';
                } else {
                    overlay.style.opacity = '1';
                }
            }
        });
    });
}
        // ============================================
        // ABRIR MODAL DE EXCLUIR POST
        // ============================================
        function openDeletePostModal(postId) {
            console.log('🗑️ Abrindo modal para excluir post:', postId);
            deletePostId = postId;
            const input = document.getElementById('deletePostId');
            if (input) input.value = postId;
            openModal('deletePostModal');
        }

        // ============================================
        // CONFIRMAR EXCLUIR POST
        // ============================================
        async function confirmDeletePost() {
            console.log('✅ Confirmando exclusão do post');
            
            const input = document.getElementById('deletePostId');
            const postId = input ? input.value : null;
            
            console.log('📝 Post ID:', postId);
            
            if (!postId) {
                showToast('Nenhum post selecionado', 'error');
                return;
            }
            
            showLoading();
            
            try {
                const { data: post, error: fetchError } = await db
                    .from('social_posts')
                    .select('image_url')
                    .eq('id', postId)
                    .single();
                
                if (fetchError) {
                    console.error('❌ Erro ao buscar post:', fetchError);
                    hideLoading();
                    showToast('Erro ao buscar postagem', 'error');
                    return;
                }
                
                console.log('📸 Post encontrado:', post);
                
                const { error: deleteError } = await db
                    .from('social_posts')
                    .delete()
                    .eq('id', postId)
                    .eq('user_id', currentUser.id);
                
                if (deleteError) {
                    console.error('❌ Erro ao excluir post:', deleteError);
                    hideLoading();
                    showToast('Erro ao excluir postagem: ' + deleteError.message, 'error');
                    return;
                }
                
                console.log('✅ Post excluído do banco');
                
                if (post?.image_url) {
                    try {
                        const urlParts = post.image_url.split('/');
                        const bucketIndex = urlParts.indexOf('post-images');
                        if (bucketIndex !== -1) {
                            const filePath = urlParts.slice(bucketIndex + 1).join('/');
                            console.log('📁 Excluindo imagem:', filePath);
                            if (filePath) {
                                await db.storage.from('post-images').remove([filePath]);
                            }
                        }
                    } catch (storageError) {
                        console.warn('⚠️ Erro ao excluir imagem do storage:', storageError);
                    }
                }
                
                hideLoading();
                closeModal('deletePostModal');
                showToast('Postagem excluída!', 'success');
                
                await loadUserPosts();
                
                const { count: postCount } = await db
                    .from('social_posts')
                    .select('*', { count: 'exact', head: true })
                    .eq('user_id', currentUser.id);
                
                const postCountEl = document.getElementById('postCount');
                if (postCountEl) postCountEl.textContent = postCount || 0;
                
                console.log('✅ Processo concluído');
                
            } catch (error) {
                console.error('❌ Erro inesperado:', error);
                hideLoading();
                showToast('Erro ao excluir postagem', 'error');
            }
        }

        // ============================================
        // CARREGAR VIAGENS DO USUÁRIO
        // ============================================
        async function loadUserTrips() {
            const { data: trips, error } = await db
                .from('trips')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('start_date', { ascending: false });
            
            const container = document.getElementById('userTrips');
            if (!container) return;
            
            if (error || !trips || trips.length === 0) {
                container.innerHTML = `<div class="empty-state"><p>Nenhuma viagem criada ainda</p><button class="btn-primary" onclick="window.location.href=buildUrl('home.html?action=create-trip')">Criar primeira viagem</button></div>`;
                return;
            }
            
            let html = '';
            for (const trip of trips) {
                const tripId = trip.id;
                const title = escapeHtml(trip.title);
                const startDate = formatDate(trip.start_date);
                const endDate = formatDate(trip.end_date);
                const detailUrl = buildUrl('trip-detail.html?id=' + tripId);
                
                html += `
                    <div class="flex justify-between align-center" style="margin-bottom: 12px; padding: 8px; background: var(--gray-50); border-radius: 8px;">
                        <div>
                            <strong>${title}</strong>
                            <div style="font-size: 12px; color: var(--gray-500);">${startDate} - ${endDate}</div>
                        </div>
                        <button class="btn-secondary" onclick="window.location.href='${detailUrl}'">
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }

        // ============================================
        // SALVAR PERFIL
        // ============================================
        async function saveProfile() {
            const nameInput = document.getElementById('editName');
            const bioInput = document.getElementById('editBio');
            
            const name = nameInput ? nameInput.value : '';
            const bio = bioInput ? bioInput.value : '';
            
            if (!name) {
                showToast('Nome é obrigatório', 'error');
                return;
            }
            
            showLoading();
            
            const { error } = await db
                .from('profiles')
                .update({ name: name, bio: bio })
                .eq('id', currentUser.id);
            
            hideLoading();
            
            if (error) {
                showToast('Erro ao salvar', 'error');
                return;
            }
            
            showToast('Perfil atualizado!', 'success');
            closeModal('editModal');
            await loadProfile();
        }

        // ============================================
        // ALTERAR AVATAR
        // ============================================
        async function changeAvatar(file) {
            showLoading();
            
            try {
                const url = await uploadImage(file, 'avatars', currentUser.id);
                
                const { error } = await db
                    .from('profiles')
                    .update({ avatar_url: url })
                    .eq('id', currentUser.id);
                
                if (error) throw error;
                
                showToast('Avatar atualizado!', 'success');
                await loadProfile();
            } catch (error) {
                showToast('Erro ao atualizar avatar', 'error');
            }
            
            hideLoading();
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        function setupEventListeners() {
            const editBtn = document.getElementById('editProfileBtn');
            if (editBtn) {
                editBtn.addEventListener('click', () => {
                    const nameInput = document.getElementById('editName');
                    const bioInput = document.getElementById('editBio');
                    if (nameInput) nameInput.value = currentProfile?.name || '';
                    if (bioInput) bioInput.value = currentProfile?.bio || '';
                    openModal('editModal');
                });
            }
            
            const avatarBtn = document.getElementById('changeAvatarBtn');
            if (avatarBtn) {
                avatarBtn.addEventListener('click', () => {
                    document.getElementById('avatarInput')?.click();
                });
            }
            
            const avatarInput = document.getElementById('avatarInput');
            if (avatarInput) {
                avatarInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) changeAvatar(file);
                });
            }
        }

        // ============================================
        // INIT
        // ============================================
        loadProfile();
        setupEventListeners();
    </script>

    <style>
        .change-avatar-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .post-item:hover .post-overlay {
            opacity: 1 !important;
        }
        @media (max-width: 480px) {
            .posts-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</body>
</html>
