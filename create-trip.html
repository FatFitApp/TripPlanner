<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Criar Viagem - Trip Planner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="home-container">
        <header class="app-header">
            <button class="menu-btn" onclick="window.location.href='home.html'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h2>Criar Viagem</h2>
            <div style="width: 40px;"></div>
        </header>

        <main class="main-content">
            <div class="card">
                <form id="createTripForm">
                    <div class="input-group">
                        <i class="fas fa-tag"></i>
                        <input type="text" id="tripTitle" placeholder="Título da viagem" required>
                    </div>
                    
                    <div class="input-group">
                        <i class="fas fa-map-marker-alt"></i>
                        <input type="text" id="tripDestination" placeholder="Destino (ex: Gramado, Brasil)">
                    </div>
                    
                    <div class="flex gap-1">
                        <div class="input-group" style="flex: 1;">
                            <i class="fas fa-calendar-alt"></i>
                            <input type="date" id="tripStartDate" required>
                        </div>
                        <div class="input-group" style="flex: 1;">
                            <i class="fas fa-calendar-alt"></i>
                            <input type="date" id="tripEndDate" required>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <i class="fas fa-info-circle"></i>
                        <textarea id="tripObservation" placeholder="Observações (opcional)" rows="3" style="resize: none;"></textarea>
                    </div>
                    
                    <div class="flex gap-1" style="margin: 16px 0;">
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="tripPublic">
                            <span>🌍 Tornar viagem pública</span>
                        </label>
                    </div>
                    
                    <div class="flex gap-1">
                        <button type="button" class="btn-secondary" onclick="window.location.href='home.html'">Cancelar</button>
                        <button type="submit" class="btn-primary" style="flex: 1;">Criar Viagem</button>
                    </div>
                </form>
            </div>

            <div class="card" style="background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%); color: white;">
                <h4><i class="fas fa-lightbulb"></i> Dica</h4>
                <p style="font-size: 14px;">Após criar a viagem, você poderá adicionar roteiros, convidar amigos e acompanhar seus gastos!</p>
            </div>
        </main>
    </div>

    <div id="loading-screen" class="loading-screen" style="display: none;">
        <div class="loading-content">
            <i class="fas fa-plane-departure fa-3x loading-icon"></i>
            <div class="loading-dots"><span></span><span></span><span></span></div>
            <p>Carregando...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i><span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('show');
                setTimeout(() => toast.remove(), 3000);
            }, 10);
        }

        function showLoading() {
            document.getElementById('loading-screen').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loading-screen').style.display = 'none';
        }

        document.getElementById('createTripForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('tripTitle').value;
            const destination = document.getElementById('tripDestination').value;
            const startDate = document.getElementById('tripStartDate').value;
            const endDate = document.getElementById('tripEndDate').value;
            const observation = document.getElementById('tripObservation').value;
            const isPublic = document.getElementById('tripPublic').checked;
            
            if (!title || !startDate || !endDate) {
                showToast('Preencha os campos obrigatórios', 'error');
                return;
            }
            
            const user = await getCurrentUser();
            if (!user) return;
            
            showLoading();
            
            const { error } = await db.from('trips').insert({
                user_id: user.id,
                title: title,
                destination: destination,
                start_date: startDate,
                end_date: endDate,
                observation: observation,
                is_public: isPublic,
                created_at: new Date()
            });
            
            hideLoading();
            
            if (error) {
                showToast('Erro ao criar viagem: ' + error.message, 'error');
                return;
            }
            
            showToast('Viagem criada com sucesso!', 'success');
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 1500);
        });
    </script>
</body>
</html>
